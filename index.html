<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>中央刑案公開資料庫</title>

<style>

body {
    margin: 0;
    background: #0b0b0b;
    color: #e5e5e5;
    font-family: Arial, "Microsoft JhengHei", sans-serif;
}


header {
    background: #140000;
    border-bottom: 1px solid #7d0000;
    padding: 40px;
}


.logo {
    font-size: 36px;
    font-weight: bold;
    letter-spacing: 5px;
}


.subtitle {
    color: #888;
    margin-top: 10px;
}



nav {
    background: #111;
    padding: 15px 40px;
}


nav a {
    color: #bbb;
    text-decoration: none;
    margin-right: 30px;
}



main {
    padding: 40px;
}



.box {

    background: #151515;
    border: 1px solid #333;
    padding: 30px;
    margin-bottom: 30px;

}



input {

    width: 70%;
    padding: 15px;
    background: #000;
    color: white;
    border: 1px solid #555;

}



button {

    padding: 15px 25px;
    background: #8b0000;
    color:white;
    border: none;

}



.cards {

    display:flex;
    gap:20px;

}



.card {

    background:#111;
    border:1px solid #333;
    padding:20px;
    width:200px;
    text-align:center;

}



.number {

    font-size:35px;
    color:#ff4444;

}



.case {

    border-left:3px solid #900;
    padding-left:20px;

}



footer {

    text-align:center;
    color:#666;
    padding:30px;

}


</style>

</head>



<body>


<header>

<div class="logo">
中央刑案公開資料庫
</div>

<div class="subtitle">

</div>

首頁
</a>

</a>


<a href="#">

</a>


<a href="#">
調查論壇
</a>


</nav>




<main>


<div class="box">

<h2>
案件檢索系統
</h2>


<input placeholder="輸入案件編號或關鍵字">


<button>
搜尋
</button>


</div>





<div class="cards">


<div class="card">

<h3>

</h3>

</div>

</div>

</div>

<h2>

</div>


</div>



</main>




<footer>

中央刑案公開資料庫 © 2026

</footer>

</html>
